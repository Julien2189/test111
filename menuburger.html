<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
              --gold: #d4a843;
  --gold-light: #f0c96a;
  --bg: #343438;
  --bg2: #c9c9d4;
  --surface: #a7a7b6;
  --border: rgba(212,168,67,0.20);
  --border-dim: rgba(255,255,255,0.07);
  --text-2: #c8c2b8;
}

/* ── Reset ──────────────────────────────── */
* {
  box-sizing: border-box;
}

/* ── Body ───────────────────────────────── */
body {
  margin: 0;
  background: var(--bg);
  font-family: Arial, sans-serif;
}
        .site-header{
            position: relative ;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }

        .logo {
            color: var(--gold-light);
            text-decoration: none; 
            font-size: .85rem;
            letter-spacing: .12em;
            text-transform: uppercase;
                }
        .burger-nav ul {
            display: flex;
            gap: 1.2rem;
            list-style: none;
        }
        .burger-nav a {
            text-decoration: none;
            color: var(--text-2);
            font-size: .75rem;
            transition: color .2s;
        }

        .burger-nav a:hover  {
            color:var(--gold)  ;
        }
        .burger-btn {
            display: none;
            flex-direction: column;
            gap:5px ; 
            background: none;
            border: 1px solid var(--border-dim);
            padding: .7rem; 
            border-radius: 8px;
            cursor: pointer;
        }

        .burger-btn span {
            display: block;
            width: 26px;
            height: 2px;
            background: var(--gold-light);
            transition: transform .25s,opacity .25s ;
        }
        .burger-btn[aria-expanded="true"] span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}

.burger-btn[aria-expanded="true"] span:nth-child(2) {
  opacity: 0;
}

.burger-btn[aria-expanded="true"] span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

        /* ── Responsive mobile ──────────────────── */
/* @media applique ces styles seulement si
   l'écran fait 768px ou moins */
@media (max-width: 768px) {

  /* Le bouton devient visible en mobile */
  .burger-btn {
    display: flex;
  }

  /* Le menu est caché par défaut */
  /* position: absolute le sort du flux normal
     top le place sous le header
     right le colle à droite */
  .burger-nav {
    display: none;
    position: absolute;
    top: calc(100% + 10px);
    right: 1rem;
    width: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }

  /* Quand la classe open est ajoutée, le menu apparaît */
  .burger-nav.open {
    display: block;
  }

  /* Les liens passent en colonne sur mobile */
  .burger-nav ul {
    flex-direction: column;
    gap: .9rem;
  }
}
h1  ,h2 ,h3{
    color: white;
}
main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border: 1px solid white;
    height: 100vh;
    width: 100%;

}
.container {
    display: grid;
    grid-template-columns: 3fr 1fr;
}
p {
    color: white;
}
.custom-modal{
    position: fixed ;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0; 
    pointer-events: none;
    transition: opacity 0.3 ease;
    z-index: 2000 ;
}
.custom-modal-open {
    opacity: 1;
    pointer-events: all;
}
.custom-modal-content {
    position: relative; 
    width: min(100% ,520px) ;
    background:var(--bg-card);
    border: 1px solid var(--border-hover);
    border-radius: var();
}
    </style>
</head>
<body>
    <header class="site-header">
        <a href="#">Frontedn Mastery</a>
        <button class="burger-btn" id="burger-btn"
    aria-label="Ouvrir le menu"
    aria-expanded="false"
    aria-controls="burger-nav">
    <span></span>
    <span></span>
    <span></span>
        </button>

        <nav class="burger-nav" id="burger-nav">
            <ul>
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Javascript</a></li>
                <li><a href="#">TypeScript</a></li>
                <li><a href="#">React</a></li>
                <li><a href="#">Angular</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
    <main>
        <h1 >test</h1>
        <button class="demo-btn">Ouvrir le modal</button>

        <div class="custom-modal" id="customModal">
            <div class="custum-modal-content">
                <button class="custom-modal-close" id="closeModalBtn">X</button>
                <h3>Bienvenue dans la modal</h3>
                <p>Tu peux afficher un message ici</p>
            </div>
        </div>
    </main>
    <aside>
        <h2>test2</h2>
    </aside>
    </div>
    <footer>
        <p>Fais avec amour </p>
    </footer>
<script>
    const burgerBtn = document.getElementById('burger-btn') ;
    const burgerNav = document.getElementById('burger-nav') ;

    if (burgerBtn && burgerNav) {
        burgerBtn.addEventListener('click' , () =>{
            const isOpen = burgerNav.classList.toggle("open") ;
            burgerBtn.setAttribute("aria-expanded" , isOpen ? "true" : "false") ;
        })
    }
</script>
</body>
</html>
