<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a href="#">Frontedn Mastery</a>
        <button class="burger-btn" id="burger-btn"
    aria-label="Ouvrir le menu"
    aria-expanded="false"
    aria-controls="burger-nav">
    <span></span>
    <span></span>
    <span></span>
        </button>

        <nav class="burger-nav" id="burger-nav">
            <ul>
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Javascript</a></li>
                <li><a href="#">TypeScript</a></li>
                <li><a href="#">React</a></li>
                <li><a href="#">Angular</a></li>
            </ul>
        </nav>
        <button id='burger1'>test</button>
    </header>
    <div class="container">
    <main>
        <h1 >test</h1>
        <button class="demo-btn" id="openModalBtn">Ouvrir le modal</button>

        <div class="custom-modal" id="customModal">
            <div class="custum-modal-content">
                <button class="custom-modal-close" id="closeModalBtn">X</button>
                <h3>Bienvenue dans la modal</h3>
                <p>Tu peux afficher un message ici</p>
            </div>
        </div>
        <button id="btn">supprime</button>
    </main>
    <aside>
        <div class="menu" id="menu">
            <h2>menu</h2>
            <p>test1</p>
            <p>test2</p>
            <p>test3</p>
        </div>
    </aside>
    </div>
    <footer>
        <p>Fais avec amour </p>
    </footer>
<script>
    const burgerBtn = document.getElementById('burger-btn') ;
    const burgerNav = document.getElementById('burger-nav') ;

    if (burgerBtn && burgerNav) {
        burgerBtn.addEventListener('click' , () =>{
            const isOpen = burgerNav.classList.toggle("open") ;
            burgerBtn.setAttribute("aria-expanded" , isOpen ? "true" : "false") ;
        })
    }

    const openModalBtn = document.getElementById('openModalBtn') ;
    const closeModalBtn = document.getElementById('closeModalBtn') ; 
    const customModal = document.getElementById('customModal') ;

    openModalBtn.addEventListener('click' , () =>{
        customModal.classList.add('open') ;
        document.body.style.overflow = 'hidden' ; 
     });

     closeModalBtn.addEventListener('click' , () =>{
        customModal.classList.remove('open') ;
        document.body.style.overflow = '' ;
     }) ;

     customModal.addEventListener('click' , (e) => {
        if(e.target === customModal) {
            customModal.classList.remove('open') ;
            document.body.style.overflow= "" ;
        }
     }) ;

     document.addEventListener('keydown' , (e) =>{
        if(e.key === 'Escape') {
            customModal.classList.remove('open') ; 
            document.body.style.overflow = '' ; 
        }
     });
     const titre= document.querySelector('h2') ;
     const btn = document.getElementById('btn') ;
     const burger1 = document.getElementById('burger1') ;
     const menu = document.getElementById('menu') ;
     btn.addEventListener('click' , () =>{
        if(titre.style.display ===  'none')  {
            menu.style.display= "block" ;
            titre.style.display = "block" ;
            btn.textContent = "supprimer" ; 
        }
        else{

        menu.style.display= "none" ;
        titre.style.display= "none" ;
        btn.textContent = "ajouter" ;
           }
       
     }) ;


</script>
</body>
</html>
