function getTimestampsFromDays(temp) {
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - temp);

  return {
    startMs: start.getTime(),
    endMs: end.getTime(),
    startSec: Math.floor(start.getTime() / 1000),
    endSec: Math.floor(end.getTime() / 1000),
    startDate: start.toISOString().split("T")[0],
    endDate: end.toISOString().split("T")[0]
  };
}

// 2) FOREX
async function recuperePrixForex(symbole, temp) {
  try {
    const paire = pairs[symbole];
    if (!paire) {
      throw new Error("Paire forex introuvable");
    }

    const { startDate, endDate } = getTimestampsFromDays(temp);

    const response = await fetch(
      `https://api.frankfurter.dev/v1/${startDate}..${endDate}?base=${paire.base}&symbols=${paire.quote}`
    );

    if (!response.ok) {
      throw new Error(`Erreur HTTP ${response.status}`);
    }

    const data = await response.json();

    if (!data.rates || typeof data.rates !== "object") {
      throw new Error("Réponse Frankfurter invalide");
    }

    const resultat = Object.entries(data.rates).map(([date, rates]) => {
      const close = Number(rates[paire.quote]);
      const timestamp = new Date(date).getTime();

      // format compatible avec ton parsing actuel
      return [
        timestamp, // openTime
        close,     // open
        close,     // high
        close,     // low
        close,     // close
        0,         // volume
        timestamp, // closeTime
        0,         // quoteVolume
        0,         // trades
        0,         // takerBuyBaseVolume
        0          // takerBuyQuoteVolume
      ];
    });

    return resultat;
  } catch (error) {
    console.error(error);
    setStatus('error', 'Erreur chargement forex');
    addLog(`Erreur forex : ${error.message}`);
    return [];
  }
}

// 3) ACTIONS FR
async function recuperePrixAction(symbole, temp) {
  const token = "d5pabi1r01qs8sp50pagd5pabi1r01qs8sp50pb0";

  try {
    const { startSec, endSec } = getTimestampsFromDays(temp);

    const response = await fetch(
      `https://finnhub.io/api/v1/stock/candle?symbol=${symbole}&resolution=D&from=${startSec}&to=${endSec}&token=${token}`
    );

    if (!response.ok) {
      throw new Error(`Erreur HTTP ${response.status}`);
    }

    const data = await response.json();

    if (
      data.s !== "ok" ||
      !Array.isArray(data.t) ||
      !Array.isArray(data.o) ||
      !Array.isArray(data.h) ||
      !Array.isArray(data.l) ||
      !Array.isArray(data.c)
    ) {
      throw new Error("Réponse Finnhub invalide");
    }

    return data.t.map((timestamp, index) => [
      timestamp * 1000,         // openTime
      data.o[index] ?? 0,       // open
      data.h[index] ?? 0,       // high
      data.l[index] ?? 0,       // low
      data.c[index] ?? 0,       // close
      data.v?.[index] ?? 0,     // volume
      timestamp * 1000,         // closeTime
      0,                        // quoteVolume
      0,                        // trades
      0,                        // takerBuyBaseVolume
      0                         // takerBuyQuoteVolume
    ]);
  } catch (error) {
    console.error(error);
    setStatus('error', 'Erreur chargement action');
    addLog(`Erreur action FR : ${error.message}`);
    return [];
  }
}

    return data.t.map((timestamp, index) => [
      timestamp * 1000,         // openTime
      data.o[index] ?? 0,       // open
      data.h[index] ?? 0,       // high
      data.l[index] ?? 0,       // low
      data.c[index] ?? 0,       // close
      data.v?.[index] ?? 0,     // volume
      timestamp * 1000,         // closeTime
      0,                        // quoteVolume
      0,                        // trades
      0,                        // takerBuyBaseVolume
      0                         // takerBuyQuoteVolume
    ]);
  } catch (error) {
    console.error(error);
    setStatus('error', 'Erreur chargement action US');
    addLog(`Erreur action US : ${error.message}`);
    return [];
  }
}
  DOM.btnPredict.addEventListener('click', async () => {
    if (close.length < 2) {
      clearLogs();
      addLog("Charge d'abord les données.");
      DOM.logPanel.classList.add('visible');
      setStatus('error', 'Pas de données');
      return;
    }

    const totalEpochs = 500;

    clearLogs();
    resetProgress(totalEpochs);
    DOM.predictionPanel.classList.remove('visible');
    DOM.logPanel.classList.add('visible');

    addLog(`Préparation du modèle pour ${DOM.assetSelect.value}...`);
    addLog(`Début de l'entraînement sur ${close.length} valeurs.`);
    setStatus('loading', 'Entraînement...');

    const xsData = close.slice(0, -1);
    const ysData = close.slice(1);

    const xs = tf.tensor2d(xsData, [xsData.length, 1]);
    const ys = tf.tensor2d(ysData, [ysData.length, 1]);

    const model = tf.sequential();
    model.add(tf.layers.dense({ units: 16, activation: 'relu', inputShape: [1] }));
    model.add(tf.layers.dense({ units: 8, activation: 'relu' }));
    model.add(tf.layers.dense({ units: 1, activation: 'linear' }));

    model.compile({
      optimizer: 'adam',
      loss: 'meanSquaredError'
    });

    try {
      await model.fit(xs, ys, {
        epochs: totalEpochs,
        callbacks: {
          onTrainBegin: async () => {
            addLog('Entraînement lancé...');
            await tf.nextFrame();
          },

          onEpochEnd: async (epoch, logs) => {
            const currentEpoch = epoch + 1;
            const progress = (currentEpoch / totalEpochs) * 100;

            DOM.progressFill.style.width = `${progress}%`;
            DOM.progressLabel.textContent = `Entraînement — Epoch ${currentEpoch} / ${totalEpochs}`;

            addLog(
              `<span class="log-epoch">Epoch ${currentEpoch}</span> — <span class="log-loss">Loss: ${logs.loss.toFixed(6)}</span>`,
              'epoch'
            );

            setStatus('loading', `Epoch ${currentEpoch}/${totalEpochs}`);
            await tf.nextFrame();
          },

          onTrainEnd: async () => {
            addLog("Entraînement terminé.");
            await tf.nextFrame();
          }
        }
      });

      const lastClose = close[close.length - 1];
      const input = tf.tensor2d([lastClose], [1, 1]);

      const pred = model.predict(input);
      const valeurPredite = pred.dataSync()[0];

      DOM.predictionPanel.classList.add('visible');
      DOM.predictionValue.textContent = `${valeurPredite.toFixed(6)} USDT`;
      DOM.predictionMeta.textContent =
        `Modèle : Dense 16→8→1 · ${totalEpochs} epochs · Dernière clôture : ${lastClose.toFixed(6)} USDT`;

      addLog(`Dernière clôture : ${lastClose.toFixed(6)} USDT`);
      addLog(`Prédiction J+1 : ${valeurPredite.toFixed(6)} USDT`);

      setStatus('ready', 'Prédiction prête');

      pred.dispose();
      input.dispose();
    } catch (error) {
      console.error(error);
      addLog(`Erreur pendant l'entraînement : ${error.message}`);
      setStatus('error', 'Erreur modèle');
    } finally {
      xs.dispose();
      ys.dispose();
    }
  }) ; 
</script>
