<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header {
            position: fixed; 
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: rgba(10, 10, 15, .88);
            backdrop-filter: blur(20px);

            border-bottom: 1px solid rgba(0,201,122,.12);
            z-index: 100;
            transition: box-shadow 0.3s ease background 0.3s ease ;
               }

               header.scrolled {
                box-shadow: 0 4px 30px rgba(0,201,122,.1);
               }
               .nav-inner{
                width: min(1200px,calc(100% - 2rem));
                height: 100%;
                margin: 0 auto; 
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
               }

               .logo {
                color: #00c97a;
                text-decoration: none;
                font-size: 1.1rem;
                font-weight: 700; 
                letter-spacing: 0.02rem;
               }
               .nav-links {
                display: flex ;
                align-items: center;
                gap: 1.5rem;
                list-style: none;
               }
               .nav-links a {
                color: #e8e8f0;
                text-decoration: none;
                font-size: 0.9rem;
                transition:color 0.3s ease ;
               }
               .nav-links a:hover {
                color: #00c97a ;
               }
               .burger {
                display:  none;
                flex-direction: column;
                background: none;
                gap: 5px;

                border:none ;
                color:#e8e8f0 ;
                font-size: 1.4rem;
                cursor: pointer;
               }
               .burger span{
                display: block;
                width: 24px;
                height: 2px;
                background: white;
                transition: all 0.3s ease;
                transform-origin: center ;
               }
               .burger.open span:nth-child(1) {
                transform: translate(7px) rotate(45deg);
               }
               .burger.open span:nth-child(2) {
                opacity: 0; 
                transform: scaleX(0);
               }
               .burger.open span:nth-child(3) {
                transform: translate(-7px) rotate(-45deg);
               }
               .nav-mobile {
                position: fixed;
                inset: 0;
                background: #0a0a0f;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap:2rem ; 
                list-style: none;
                transform: translateX(100%);
                transition: transform 0.4s ease; 
                z-index: 100;

               }
               .nav-mobile a {
                color: #e8e8f0;
                text-decoration: none;
                font-size: clamp(1.4rem ,5vw ,2.2rem);
                font-weight: 700; 
                 transition: color 0.3s ease;
               }
               .nav-mobile a:hover {
                color: #00c97a;
               }

            @media (max-width:767px) {
  .nav-links {
    display: none;
  }

  .burger {
    display: flex;
  }
}
               
              
    </style>
  
</head>
<body>
    <header id="mainHeader">
        <nav class="nav-inner">
            <div class="logo">MonSite</div>
            <ul class="nav-links">
                <li><a href="#accueil">Accueil</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button class="burger" id="burger" aria-label="Ouvrir le menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-mobile" id="navMobile">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">A propos</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

        </nav>
    </header>
    <main></main>
    <aside></aside>
    <footer></footer>
    <script>
        const burger = document.getElementById('burger') ;
        const menu = document.getElementById('navMobile') ;

        burger.addEventListener('click' ,()=>{
            burger.classList.toggle('open') ;
            menu.classList.toggle('open') ;

            document.body.style.overflow= 
            menu.classList.contains ('open')
            ? 'hidden' 
            : '' ;

        }) ;
       document.querySelectorAll('.nav-mobile a').forEach(a => {
      a.addEventListener('click', () => {
        burger.classList.remove('open');
        menu.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
    </script>
</body>
</html>
